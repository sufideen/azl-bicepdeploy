<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380" font-family="Segoe UI, Arial, sans-serif">

  <rect width="900" height="380" fill="#0d1117" rx="12"/>

  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="white">GitHub Actions CI/CD Pipeline</text>
  <text x="450" y="57" text-anchor="middle" font-size="11" fill="#8b949e">.github/workflows/deploy.yml · OIDC Passwordless Auth · Azure ALZ GitOps</text>

  <!-- Step boxes Y center = 160 -->

  <!-- Step 1: git push -->
  <rect x="30" y="100" width="120" height="120" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="90" y="130" text-anchor="middle" font-size="28">📦</text>
  <text x="90" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="white">git push</text>
  <text x="90" y="174" text-anchor="middle" font-size="9" fill="#8b949e">Developer pushes</text>
  <text x="90" y="188" text-anchor="middle" font-size="9" fill="#8b949e">to main branch</text>
  <rect x="50" y="210" width="80" height="18" rx="4" fill="#238636"/>
  <text x="90" y="223" text-anchor="middle" font-size="9" font-weight="bold" fill="white">TRIGGER</text>

  <!-- Arrow -->
  <line x1="150" y1="160" x2="178" y2="160" stroke="#30363d" stroke-width="2"/>
  <polygon points="172,155 182,160 172,165" fill="#8b949e"/>

  <!-- Step 2: Checkout -->
  <rect x="180" y="100" width="120" height="120" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="240" y="130" text-anchor="middle" font-size="28">🔄</text>
  <text x="240" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Checkout</text>
  <text x="240" y="174" text-anchor="middle" font-size="9" fill="#8b949e">actions/checkout@v4</text>
  <text x="240" y="188" text-anchor="middle" font-size="9" fill="#8b949e">Fetch Bicep code</text>
  <rect x="200" y="210" width="80" height="18" rx="4" fill="#1f6feb"/>
  <text x="240" y="223" text-anchor="middle" font-size="9" font-weight="bold" fill="white">STEP 1</text>

  <!-- Arrow -->
  <line x1="300" y1="160" x2="328" y2="160" stroke="#30363d" stroke-width="2"/>
  <polygon points="322,155 332,160 322,165" fill="#8b949e"/>

  <!-- Step 3: OIDC Login -->
  <rect x="330" y="100" width="120" height="120" rx="10" fill="#21262d" stroke="#0078d4" stroke-width="2"/>
  <text x="390" y="130" text-anchor="middle" font-size="28">🔐</text>
  <text x="390" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="white">OIDC Login</text>
  <text x="390" y="174" text-anchor="middle" font-size="9" fill="#58a6ff">azure/login@v2</text>
  <text x="390" y="188" text-anchor="middle" font-size="9" fill="#8b949e">Passwordless token</text>
  <rect x="350" y="210" width="80" height="18" rx="4" fill="#0078d4"/>
  <text x="390" y="223" text-anchor="middle" font-size="9" font-weight="bold" fill="white">STEP 2</text>

  <!-- Arrow -->
  <line x1="450" y1="160" x2="478" y2="160" stroke="#30363d" stroke-width="2"/>
  <polygon points="472,155 482,160 472,165" fill="#8b949e"/>

  <!-- Step 4: Bicep Lint -->
  <rect x="480" y="100" width="120" height="120" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="540" y="130" text-anchor="middle" font-size="28">🔍</text>
  <text x="540" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Bicep Lint</text>
  <text x="540" y="174" text-anchor="middle" font-size="9" fill="#8b949e">az bicep build</text>
  <text x="540" y="188" text-anchor="middle" font-size="9" fill="#8b949e">Syntax validation</text>
  <rect x="500" y="210" width="80" height="18" rx="4" fill="#388bfd"/>
  <text x="540" y="223" text-anchor="middle" font-size="9" font-weight="bold" fill="white">STEP 3</text>

  <!-- Arrow -->
  <line x1="600" y1="160" x2="628" y2="160" stroke="#30363d" stroke-width="2"/>
  <polygon points="622,155 632,160 622,165" fill="#8b949e"/>

  <!-- Step 5: What-If -->
  <rect x="630" y="100" width="120" height="120" rx="10" fill="#21262d" stroke="#30363d" stroke-width="1.5"/>
  <text x="690" y="130" text-anchor="middle" font-size="28">📋</text>
  <text x="690" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="white">What-If</text>
  <text x="690" y="174" text-anchor="middle" font-size="9" fill="#8b949e">arm-deploy@v2</text>
  <text x="690" y="188" text-anchor="middle" font-size="9" fill="#8b949e">Dry-run preview</text>
  <rect x="650" y="210" width="80" height="18" rx="4" fill="#9e6a03"/>
  <text x="690" y="223" text-anchor="middle" font-size="9" font-weight="bold" fill="white">STEP 4</text>

  <!-- Arrow -->
  <line x1="750" y1="160" x2="778" y2="160" stroke="#30363d" stroke-width="2"/>
  <polygon points="772,155 782,160 772,165" fill="#8b949e"/>

  <!-- Step 6: Deploy -->
  <rect x="780" y="100" width="90" height="120" rx="10" fill="#21262d" stroke="#238636" stroke-width="2"/>
  <text x="825" y="130" text-anchor="middle" font-size="28">🚀</text>
  <text x="825" y="158" text-anchor="middle" font-size="11" font-weight="bold" fill="white">Deploy</text>
  <text x="825" y="174" text-anchor="middle" font-size="9" fill="#3fb950">Push to main</text>
  <text x="825" y="188" text-anchor="middle" font-size="9" fill="#8b949e">only</text>
  <rect x="793" y="210" width="64" height="18" rx="4" fill="#238636"/>
  <text x="825" y="223" text-anchor="middle" font-size="9" font-weight="bold" fill="white">STEP 5</text>

  <!-- ── PR path annotation ── -->
  <rect x="30" y="250" width="860" height="50" rx="8" fill="#21262d" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="271" text-anchor="middle" font-size="11" fill="#8b949e">
    <tspan font-weight="bold" fill="#f0883e">Pull Request path:</tspan>
    <tspan> Steps 1–4 run (Checkout → OIDC → Lint → What-If) — Deploy is skipped. Safe validation without live changes.</tspan>
  </text>
  <text x="450" y="289" text-anchor="middle" font-size="11" fill="#8b949e">
    <tspan font-weight="bold" fill="#3fb950">Merge to main path:</tspan>
    <tspan> All 5 steps run including Step 5 Deploy — infrastructure is applied to Azure.</tspan>
  </text>

  <!-- Security callout -->
  <rect x="30" y="316" width="860" height="44" rx="8" fill="#0d419d" opacity="0.5" stroke="#1f6feb" stroke-width="1"/>
  <text x="450" y="334" text-anchor="middle" font-size="11" fill="#cae8ff">
    <tspan font-weight="bold">🔐 Security: </tspan>
    <tspan>No secrets stored in code. GitHub exchanges a short-lived OIDC token with Microsoft Entra ID at runtime.</tspan>
  </text>
  <text x="450" y="350" text-anchor="middle" font-size="10" fill="#8b949e">Federated credential trust: repo:sufideen/azl-bicepdeploy:ref:refs/heads/main → AZURE_CLIENT_ID (via credential.json)</text>

</svg>
