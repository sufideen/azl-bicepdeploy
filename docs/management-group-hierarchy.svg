  <text x="222" y="260" text-anchor="middle" font-size="9" fill="#cce5ff">Firewalls · Gateways</text>

  <!-- corp-identity -->
  <rect x="330" y="210" width="200" height="52" rx="8" fill="#2b88d8"/>
  <text x="430" y="232" text-anchor="middle" font-size="11" font-weight="bold" fill="white">corp-identity</text>
