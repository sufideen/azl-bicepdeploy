  <line x1="222" y1="196" x2="638" y2="196" stroke="#106ebe" stroke-width="1.5"/>
  <line x1="222" y1="196" x2="222" y2="210" stroke="#106ebe" stroke-width="1.5"/>
  <line x1="430" y1="196" x2="430" y2="210" stroke="#106ebe" stroke-width="1.5"/>
  <line x1="638" y1="196" x2="638" y2="210" stroke="#106ebe" stroke-width="1.5"/>

