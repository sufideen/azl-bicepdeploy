  <text x="430" y="108" text-anchor="middle" font-size="10" fill="#cce5ff">Contoso Holdings (Root)</text>

  <!-- Root → Platform connector -->
  <line x1="430" y1="116" x2="430" y2="134" stroke="#0078d4" stroke-width="1.5"/>
  <!-- Root → Workloads connector -->
  <line x1="430" y1="116" x2="430" y2="122" stroke="#0078d4" stroke-width="1.5"/>
  <line x1="222" y1="122" x2="638" y2="122" stroke="#0078d4" stroke-width="1.5"/>

  <!-- Root → Sandbox -->
  <line x1="172" y1="122" x2="172" y2="134" stroke="#0078d4" stroke-width="1.5"/>
  <!-- Root → Decommissioned -->
  <line x1="688" y1="122" x2="688" y2="134" stroke="#0078d4" stroke-width="1.5"/>

  <!-- Adjust horizontal bar -->
  <line x1="172" y1="122" x2="688" y2="122" stroke="#0078d4" stroke-width="1.5"/>

