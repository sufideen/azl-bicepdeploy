name: "Azure ALZ GitOps Deployment"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

env:
  AZURE_REGION: westeurope

# ── Job 1: Lint ───────────────────────────────────────────────────────────────
# Validates Bicep syntax for every template. No Azure credentials required.
jobs:
  lint:
    name: "Bicep Lint"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Bicep CLI
        run: az bicep install

      - name: Lint — deploy.bicep (Tenant)
        run: az bicep build --file ./deploy.bicep

      - name: Lint — governance.bicep (Management Group)
        run: az bicep build --file ./governance.bicep

      - name: Lint — logging.bicep (Subscription)
        run: az bicep build --file ./logging.bicep

      - name: Lint — modules/log-workspace.bicep
        run: az bicep build --file ./modules/log-workspace.bicep

      - name: Lint — network.bicep (Subscription)
        run: az bicep build --file ./network.bicep

# ── Job 2: Validate (What-If) ─────────────────────────────────────────────────
# Runs a What-If dry-run against all four deployment scopes.
# Executes on every push and every pull request — no live changes made.
  validate:
    name: "What-If Validation"
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: "What-If — Stage 1: Management Group Hierarchy (Tenant)"
        run: |
          az deployment tenant what-if \
            --location ${{ env.AZURE_REGION }} \
            --template-file ./deploy.bicep \
            --parameters ./parameters/deploy.bicepparam \
            --no-prompt

      - name: "What-If — Stage 2: Governance Policies (Management Group)"
        run: |
          az deployment mg what-if \
            --management-group-id ${{ secrets.AZURE_MANAGEMENT_GROUP_ID }} \
            --location ${{ env.AZURE_REGION }} \
            --template-file ./governance.bicep \
            --parameters ./parameters/governance.bicepparam \
            --no-prompt

      - name: "What-If — Stage 3: Platform Logging (Subscription)"
        run: |
          az deployment sub what-if \
            --location ${{ env.AZURE_REGION }} \
            --template-file ./logging.bicep \
            --parameters ./parameters/logging.bicepparam \
            --no-prompt

      - name: "What-If — Stage 4: Hub Network (Subscription)"
        run: |
          az deployment sub what-if \
            --location ${{ env.AZURE_REGION }} \
            --template-file ./network.bicep \
            --parameters ./parameters/network.bicepparam \
            --no-prompt

# ── Job 3: Deploy ─────────────────────────────────────────────────────────────
# Live deployment — runs ONLY on a direct push/merge to main (not on PRs).
# Stages are sequential: Tenant → Management Group → Subscription (Logging) → Subscription (Network).
  deploy:
    name: "Deploy ALZ"
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Azure Login via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Bicep CLI
        run: az bicep install

      - name: "Stage 1 — Deploy Management Group Hierarchy (Tenant)"
        run: |
          az deployment tenant create \
            --name "alz-mgmt-groups-${{ github.run_number }}" \
            --location ${{ env.AZURE_REGION }} \
            --template-file ./deploy.bicep \
            --parameters ./parameters/deploy.bicepparam \
            --no-prompt

      - name: "Stage 2 — Deploy Governance Policies (Management Group)"
        run: |
          az deployment mg create \
            --name "alz-governance-${{ github.run_number }}" \
            --management-group-id ${{ secrets.AZURE_MANAGEMENT_GROUP_ID }} \
            --location ${{ env.AZURE_REGION }} \
            --template-file ./governance.bicep \
            --parameters ./parameters/governance.bicepparam \
            --no-prompt

      - name: "Stage 3 — Deploy Platform Logging (Subscription)"
        run: |
          az deployment sub create \
            --name "alz-logging-${{ github.run_number }}" \
            --location ${{ env.AZURE_REGION }} \
            --template-file ./logging.bicep \
            --parameters ./parameters/logging.bicepparam \
            --no-prompt

      - name: "Stage 4 — Deploy Hub Network (Subscription)"
        run: |
          az deployment sub create \
            --name "alz-network-${{ github.run_number }}" \
            --location ${{ env.AZURE_REGION }} \
            --template-file ./network.bicep \
            --parameters ./parameters/network.bicepparam \
            --no-prompt
